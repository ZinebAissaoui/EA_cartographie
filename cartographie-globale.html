function mkReport(id, label, y, url) {
  const c = C.report;
  return {
    id, label, x: LX[0], y,
    fixed: { x: true, y: true },
    color: { background: c.bg, border: c.bd, highlight: { background: c.bg, border:'#fff' } },
    borderWidth: 3,
    font: { color:'#fff', size:12, face:'Segoe UI', bold:true },
    shape:'box', margin:{top:9,bottom:9,left:14,right:14},
    shadow:{enabled:true,size:10,x:3,y:3,color:'rgba(108,99,255,.45)'},
    widthConstraint:{maximum:200}, url, _isReport:true, _report:id,
  };
}

function mkNode(id, label, type, lv, y, opts={}) {
  const c = C[type];
  const err = !!opts.error;
  return {
    id, label,
    x: LX[lv] ?? (LX[0] + lv*280),
    y,
    fixed: { x: true, y: false },
    color: {
      background: c.bg,
      border: err ? '#e53935' : c.bd,
      highlight: { background: c.bg, border:'#fff' }
    },
    borderWidth: err ? 3 : 2,
    font: { color: c.f, size: 10, face:'Segoe UI' },
    shape:'box', margin:{top:5,bottom:5,left:9,right:9},
    shadow:{enabled:true,size:5,x:2,y:2,color:'rgba(0,0,0,.35)'},
    widthConstraint:{maximum:175},
    url: opts.url||null, tooltip: opts.tooltip||null,
    _report: opts.report||null, _lv: lv,
  };
}

  ch[rid] = [];
  R.layers.forEach(layer => {
    layer.forEach(nd => {
      const pid = nd.pid || rid;
      if (!ch[pid]) ch[pid] = [];
      ch[pid].push(nd.id);
      if (!ch[nd.id]) ch[nd.id] = [];
    });
  });
  // leaf count
  const lc = {};
  function leaves(id) {
    const kids = ch[id]||[];
    if (!kids.length) { lc[id]=1; return 1; }
    lc[id] = kids.reduce((s,c)=>s+leaves(c), 0);
    return lc[id];
  }
  leaves(rid);

  const LEAF_H = 100; // px per leaf slot
  const total  = lc[rid] * LEAF_H;
  const centY  = R.y;
  const yTop   = centY - total/2;
  const yBot   = centY + total/2;

  const yPos = {};
  function assign(id, t, b) {
    yPos[id] = (t+b)/2;
    const kids = ch[id]||[];
    let cur = t;
    kids.forEach(kid => {
      const h = (lc[kid]/lc[id]) * (b-t);
      assign(kid, cur, cur+h);
      cur += h;
    });
  }
  assign(rid, yTop, yBot);
  yPos[rid] = centY; // keep report node fixed
  return yPos;
}

// ══════════════════════════════════════════════════════════════
//  VIS.JS INIT
// ══════════════════════════════════════════════════════════════
const nodesDS = new vis.DataSet([
  mkReport('R1', REPORTS.R1.label, REPORTS.R1.y, REPORTS.R1.url),
  mkReport('R2', REPORTS.R2.label, REPORTS.R2.y, REPORTS.R2.url),
  mkReport('R3', REPORTS.R3.label, REPORTS.R3.y, REPORTS.R3.url),
]);
const edgesDS = new vis.DataSet([]);

const network = new vis.Network(
  document.getElementById('network'),
  { nodes: nodesDS, edges: edgesDS },
  {
    layout: { hierarchical: { enabled: false } },
    physics: { enabled: false },
    edges: {
      arrows: { to: { enabled:true, scaleFactor:0.52 } },
      color: { color:'#2a2a4a', highlight:'#6c63ff' },
      smooth: { type:'cubicBezier', forceDirection:'horizontal', roundness:0.4 },
      width: 1.2,
    },
    nodes: { borderWidth:2 },
    interaction: { hover:true, navigationButtons:true, keyboard:true, zoomView:true },
  }
);

setTimeout(() => network.fit({ animation:{ duration:500, easingFunction:'easeInOutQuad' } }), 200);

// ══════════════════════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════════════════════
let currentFocus = null;   // currently expanded report id or null
let expanding    = false;  // animation in progress
const rNodes = { R1:[], R2:[], R3:[] };  // list of added node ids
const rEdges = { R1:[], R2:[], R3:[] };  // list of added edge ids

// ══════════════════════════════════════════════════════════════
//  ANIMATE — smooth Y interpolation via requestAnimationFrame
// ══════════════════════════════════════════════════════════════
function animateY(items, duration, onDone) {
  // items: [{id, startY, endY}]
  const t0 = performance.now();
  function frame(now) {
    const t = Math.min((now - t0) / duration, 1);
    const e = t < .5 ? 2*t*t : -1+(4-2*t)*t; // easeInOut
    nodesDS.update(items.map(({id, startY, endY}) => ({
      id, y: startY + (endY - startY) * e
    })));
    if (t < 1) requestAnimationFrame(frame);
    else if (onDone) onDone();
  }
  requestAnimationFrame(frame);
}

// ══════════════════════════════════════════════════════════════
//  EXPAND — add one layer, animate to pre-computed Y positions
// ══════════════════════════════════════════════════════════════
function addLayer(rid, layerIdx, yPos, onDone) {
  const layer = REPORTS[rid].layers[layerIdx];
  const lv    = layerIdx + 1;

  // Group by parent to get parent Y
  const byPid = {};
  layer.forEach(nd => {
    const pid = nd.pid || rid;
    (byPid[pid] = byPid[pid]||[]).push(nd);
  });

  const addedNodes = [];
  const animItems  = [];
  const addedEdges = [];

  Object.entries(byPid).forEach(([pid, siblings]) => {
    const pPos = network.getPosition(pid);
    const pY   = pPos ? pPos.y : REPORTS[rid].y;

    siblings.forEach(nd => {
      const node = mkNode(nd.id, nd.lb, nd.t, lv, pY, {
        error: !!nd.e, url: nd.url, tooltip: nd.tip, report: rid
      });
      addedNodes.push(node);
      animItems.push({ id: nd.id, startY: pY, endY: yPos[nd.id] ?? pY });

      const eid = `e_${pid}_${nd.id}`;
      addedEdges.push({ id: eid, from: pid, to: nd.id });
      rNodes[rid].push(nd.id);
      rEdges[rid].push(eid);
    });
  });

  // Add extra cross-edges for this layer (last layer)
  if (layerIdx === REPORTS[rid].layers.length - 1) {
    REPORTS[rid].xedge.forEach(ex => {
      if (rNodes[rid].includes(ex.to)) {
        const eid = `xe_${ex.from}_${ex.to}`;
        addedEdges.push({ id: eid, from: ex.from, to: ex.to,
          dashes: true, color:{ color:'#3a3a5a' } });
        rEdges[rid].push(eid);
      }
    });
  }

  nodesDS.add(addedNodes);
  edgesDS.add(addedEdges);

  // Animate Y to pre-computed positions
  animateY(animItems, ANIM_MS, onDone);
}

// ══════════════════════════════════════════════════════════════
//  EXPAND ALL LAYERS — layer by layer with pause between
// ══════════════════════════════════════════════════════════════
function expandAllLayers(rid, yPos) {
  const layers = REPORTS[rid].layers;
  let idx = 0;

  function next() {
    if (idx >= layers.length) {
      // Done
      expanding = false;
      network.fit({ animation:{ duration:700, easingFunction:'easeInOutQuad' } });
      setBtn(rid, 'on');
      return;
    }
    addLayer(rid, idx, yPos, () => {
      idx++;
      setTimeout(next, 220); // small pause between layers
    });
  }
  next();
}

// ══════════════════════════════════════════════════════════════
//  FOCUS / COLLAPSE
// ══════════════════════════════════════════════════════════════
function focusReport(rid) {
  if (expanding) return;
  expanding = true;
  currentFocus = rid;

  // Hide other reports
  ['R1','R2','R3'].filter(r => r !== rid).forEach(r => {
    nodesDS.update({ id: r, hidden: true });
  });

  // Update report label
  nodesDS.update({ id: rid, label: REPORTS[rid].label.replace('📊','⟳') });
  setBtn(rid, 'loading');

  // Compute tree Y positions
  const yPos = computeTreeY(rid);

  // Zoom to report first, then start expanding
  network.fit({ nodes:[rid], animation:{ duration:300, easingFunction:'easeInOutQuad' } });
  setTimeout(() => expandAllLayers(rid, yPos), 350);
}

function collapseReport(rid) {
  if (expanding) return;

  // Remove nodes and edges
  rEdges[rid].forEach(id => { try { edgesDS.remove(id); } catch(e){} });
  rNodes[rid].forEach(id => { try { nodesDS.remove(id); } catch(e){} });
  rNodes[rid] = [];
  rEdges[rid] = [];

  // Show other reports
  ['R1','R2','R3'].forEach(r => nodesDS.update({ id: r, hidden: false, label: REPORTS[r].label }));

  currentFocus = null;
  setBtn(rid, 'off');
  network.fit({ animation:{ duration:600, easingFunction:'easeInOutQuad' } });
}

function toggleFocus(rid) {
  if (expanding) return;
  if (currentFocus === rid) {
    // Already expanded — collapse
    collapseReport(rid);
  } else if (currentFocus !== null) {
    // Another is expanded — collapse it first, then expand this one
    const prev = currentFocus;
    collapseReport(prev);
    setTimeout(() => focusReport(rid), 650);
  } else {
    focusReport(rid);
  }
}

function expandAll() {
  if (expanding || currentFocus) return;
  toggleFocus('R1');
}

function collapseAll() {
  if (expanding) return;
  if (currentFocus) collapseReport(currentFocus);
  else {
    ['R1','R2','R3'].forEach(r => {
      rEdges[r].forEach(id => { try { edgesDS.remove(id); } catch(e){} });
      rNodes[r].forEach(id => { try { nodesDS.remove(id); } catch(e){} });
      rNodes[r] = []; rEdges[r] = [];
    });
    ['R1','R2','R3'].forEach(r => nodesDS.update({ id:r, hidden:false, label:REPORTS[r].label }));
    ['R1','R2','R3'].forEach(r => setBtn(r, 'off'));
    network.fit({ animation:{ duration:600, easingFunction:'easeInOutQuad' } });
  }
}

// ══════════════════════════════════════════════════════════════
//  BUTTON STATES
// ══════════════════════════════════════════════════════════════
const BTN_LABELS = {
  R1:['📊 Rapport Global VF', '⟳ Rapport Global VF', '⊖ Rapport Global VF'],
  R2:['📊 EA-local-Global',   '⟳ EA-local-Global',   '⊖ EA-local-Global'],
  R3:['📊 Paris Rive Droite', '⟳ Paris Rive Droite', '⊖ Paris Rive Droite'],
};
function setBtn(rid, state) {
  const el = document.getElementById('btn-' + rid);
  if (!el) return;
  const [off, loading, on] = BTN_LABELS[rid];
  el.textContent = state === 'loading' ? loading : state === 'on' ? on : off;
  el.classList.toggle('on', state === 'on');
}

// ══════════════════════════════════════════════════════════════
//  TOOLTIP + EVENTS
// ══════════════════════════════════════════════════════════════
const tipEl  = document.getElementById('tooltip');
const hintEl = document.getElementById('hint');
let hintHidden = false;

network.on('hoverNode', p => {
  const nd = nodesDS.get(p.node);
  if (!nd) return;
  const clean = (nd.label||'').replace(/→.*\n?/g,'').replace(/⟳|⊖|📊/g,'').trim();
  let html = `<strong>${clean.replace(/\n/g,'<br>')}</strong>`;
  if (nd.tooltip) html += `<br><span style="color:#f9a825">${nd.tooltip}</span>`;
  if (nd.url)     html += `<br><a href="${nd.url}" target="_blank" style="margin-top:4px;display:inline-block">Ouvrir →</a>`;
  tipEl.innerHTML = html;
  tipEl.style.display = 'block';
  network.selectNodes([p.node]);
});
network.on('blurNode', () => { tipEl.style.display='none'; network.unselectAll(); });
document.addEventListener('mousemove', e => {
  tipEl.style.left = (e.clientX+15)+'px';
  tipEl.style.top  = (e.clientY+10)+'px';
});

network.on('click', p => {
  if (!hintHidden) { hintEl.style.opacity='0'; hintHidden=true; }
  if (p.nodes.length === 0) return;
  const nd = nodesDS.get(p.nodes[0]);
  if (!nd) return;
  if (nd._isReport) toggleFocus(nd.id);
  else if (nd.url) window.open(nd.url, '_blank');
});
</script>
</body>
